<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flower Animation Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0906; color: #f0e6c8; font-family: 'Montserrat', sans-serif; }
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap');
    h1 { text-align: center; font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: #c9a84c; padding: 32px 0 24px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .card { position: relative; }
    .card video { width: 100%; display: block; }
    .label {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(10,9,6,0.9), transparent);
      padding: 24px 32px 20px;
      font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: #c9a84c;
    }
    .label strong { display: block; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 1.2rem; font-weight: 300; color: #f0e6c8; letter-spacing: 0; text-transform: none; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>Flower Animation — Pick Your Preference</h1>
  <div class="grid">
    <div class="card">
      <video autoplay muted loop playsinline>
        <source src="assets/videos/flower_1.mp4" type="video/mp4">
      </video>
      <div class="label">Option 1 <strong>Flower Animation — Option 1</strong></div>
    </div>
    <div class="card">
      <video autoplay muted loop playsinline>
        <source src="assets/videos/flower_2.mp4" type="video/mp4">
      </video>
      <div class="label">Option 2 <strong>Flower Animation — Option 2</strong></div>
    </div>
  </div>
</body>
</html>
